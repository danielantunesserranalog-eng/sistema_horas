<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 SerranaHoras - Relatórios</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-moon"></i><span>SerranaHoras</span></div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                <a href="cadastro.html" class="nav-item"><i class="fas fa-user-plus"></i><span>Colaboradores</span></a>
                <a href="lancamento.html" class="nav-item"><i class="fas fa-calculator"></i><span>Lançar Horas</span></a>
                <a href="relatorios.html" class="nav-item active"><i class="fas fa-chart-bar"></i><span>Relatórios</span></a>
                <a href="excedentes.html" class="nav-item"><i class="fas fa-coins"></i><span>Horas a Mais</span></a>
            </nav>
            <div class="status-db"><i class="fas fa-database"></i><span id="dbStatus">Conectando...</span></div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title"><h1>Relatórios</h1><p>Extração e Análise de Dados</p></div>
                <div class="stats-cards">
                    <div class="stat-card"><i class="fas fa-users"></i><div><h3 id="totalColaboradores">0</h3><span>Colaboradores</span></div></div>
                    <div class="stat-card"><i class="fas fa-hourglass-half"></i><div><h3 id="totalHorasDevidas">0</h3><span>Horas a Pagar</span></div></div>
                </div>
            </header>

            <div class="tab-content active-tab">
                <div class="card">
                    <h2><i class="fas fa-filter"></i> Filtros Personalizados</h2>
                    <div class="filtros-container">
                        <div class="filtro-group">
                            <label><i class="fas fa-user"></i> Colaborador</label>
                            <select id="filtroColaborador"><option value="todos">Todos os colaboradores</option></select>
                        </div>
                        <div class="filtro-group">
                            <label><i class="fas fa-calendar"></i> Período</label>
                            <select id="filtroPeriodo">
                                <option value="todos">Todos os meses</option>
                                <option value="marco">Março</option>
                                <option value="abril">Abril</option>
                                <option value="maio">Maio</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2><i class="fas fa-download"></i> Exportar Relatórios</h2>
                    <div class="export-buttons">
                        <button id="btnExportPDF" class="btn-export pdf"><i class="fas fa-file-pdf"></i><div class="btn-content"><strong>PDF</strong><span>Documento profissional</span></div><i class="fas fa-arrow-right"></i></button>
                        <button id="btnExportExcel" class="btn-export excel"><i class="fas fa-file-excel"></i><div class="btn-content"><strong>Excel</strong><span>Planilha editável</span></div><i class="fas fa-arrow-right"></i></button>
                        <button id="btnExportCSV" class="btn-export csv"><i class="fas fa-file-csv"></i><div class="btn-content"><strong>CSV</strong><span>Dados brutos</span></div><i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
                <div class="card">
                    <h2><i class="fas fa-eye"></i> Prévia do Relatório</h2>
                    <div class="relatorio-preview" id="relatorioPreview">
                        <div class="preview-header"><i class="fas fa-chart-line"></i><h3>Relatório de Horas a Pagar</h3><span id="previewData"></span></div>
                        <div class="previa-tabela" id="previaTabela"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/relatorios.js"></script>
</body>
</html>
